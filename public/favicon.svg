<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff2346"/>
      <stop offset="55%" stop-color="#ff5e1a"/>
      <stop offset="100%" stop-color="#ffb020"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="16" fill="#0b0b17"/>
  <rect x="1" y="1" width="62" height="62" rx="15" stroke="url(#g)" stroke-width="1.5" stroke-opacity="0.6" fill="none"/>
  <!-- Broadcast signal arcs -->
  <path d="M18 46 C18 30 24 20 32 20" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round" stroke-opacity="0.45" fill="none"/>
  <path d="M46 46 C46 30 40 20 32 20" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round" stroke-opacity="0.45" fill="none"/>
  <path d="M23 48 C23 34 27 26 32 26" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round" stroke-opacity="0.7" fill="none"/>
  <path d="M41 48 C41 34 37 26 32 26" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round" stroke-opacity="0.7" fill="none"/>
  <!-- Center broadcast dot -->
  <circle cx="32" cy="48" r="5" fill="url(#g)" filter="url(#glow)"/>
  <circle cx="32" cy="48" r="2.5" fill="white" fill-opacity="0.9"/>
</svg>
