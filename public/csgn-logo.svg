<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- CSGN network avatar: black square, forward-leaning wordmark, red swoosh.
       Vector twin of the brand PNG so the favicon/header never depend on an
       external CDN. -->
  <rect width="256" height="256" fill="#0c0c0e"/>
  <g transform="translate(28 76)">
    <text x="10" y="66" transform="skewX(-8)" font-family="'Arial Black', 'Archivo Black', system-ui, sans-serif" font-style="italic" font-weight="900" font-size="63" letter-spacing="-1.5" fill="#f2ede1">CSGN</text>
    <path d="M9 78 Q 105 81 219 48 Q 99 99 9 78 Z" fill="#ff2346"/>
  </g>
</svg>
