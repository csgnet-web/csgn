[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/auth/twitch/callback"
  to = "/.netlify/functions/twitchOAuthCallback"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
